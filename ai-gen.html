<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Texas A&M Football Stats</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
  body {
    font-family: 'Poppins', sans-serif;
    background-color: #111;
    color: #fff;
    margin: 0;
    padding: 0;
  }
  nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: #500000;
    padding: 1rem 2rem;
  }
  nav .logo {
    font-size: 1.5rem;
    font-weight: bold;
  }
  nav ul {
    list-style: none;
    display: flex;
    gap: 2rem;
  }
  nav ul li a {
    color: white;
    text-decoration: none;
    font-weight: 500;
  }
  header {
    text-align: center;
    padding: 2rem;
  }
  header h1 {
    font-size: 2.5rem;
    margin-bottom: 0.5rem;
    color: #b5a642;
  }
  header p {
    font-size: 1.2rem;
    color: #ccc;
  }
  .stats-container {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 2rem;
    padding: 2rem;
  }
  .card {
    background: #222;
    border-radius: 12px;
    padding: 1.5rem;
    width: 300px;
    box-shadow: 0 0 15px rgba(0,0,0,0.5);
    text-align: center;
  }
  .card h3 {
    margin-bottom: 1rem;
    color: #b5a642;
  }
  canvas {
    background: #111;
    border-radius: 12px;
  }
  footer {
    text-align: center;
    padding: 1rem;
    background: #500000;
    color: #fff;
  }
</style>
</head>
<body>

<nav>
  <div class="logo">Texas A&M Football</div>
  <ul>
    <li><a href="#overview">Overview</a></li>
    <li><a href="#stats">Stats</a></li>
    <li><a href="#charts">Charts</a></li>
  </ul>
</nav>

<header id="overview">
  <h1>Texas A&M Aggies Football</h1>
  <p>Season 2025 Stats & Highlights</p>
</header>

<section class="stats-container" id="stats">
  <div class="card">
    <h3>Total Wins</h3>
    <p>8</p>
  </div>
  <div class="card">
    <h3>Total Losses</h3>
    <p>3</p>
  </div>
  <div class="card">
    <h3>Total Touchdowns</h3>
    <p>34</p>
  </div>
  <div class="card">
    <h3>Total Yards</h3>
    <p>4,512</p>
  </div>
</section>

<section class="stats-container" id="charts">
  <div class="card">
    <h3>Points Per Game</h3>
    <canvas id="pointsChart" width="300" height="200"></canvas>
  </div>
  <div class="card">
    <h3>Yards Per Game</h3>
    <canvas id="yardsChart" width="300" height="200"></canvas>
  </div>
</section>

<footer>
  &copy; 2025 Texas A&M Football Stats Page
</footer>

<script>
  const pointsCtx = document.getElementById('pointsChart').getContext('2d');
  const pointsChart = new Chart(pointsCtx, {
      type: 'line',
      data: {
          labels: ['Week 1', 'Week 2', 'Week 3', 'Week 4', 'Week 5'],
          datasets: [{
              label: 'Points',
              data: [24, 31, 28, 35, 27],
              borderColor: '#b5a642',
              backgroundColor: 'rgba(181,166,66,0.2)',
              fill: true,
              tension: 0.3
          }]
      },
      options: {
          scales: {
              y: { beginAtZero: true }
          },
          plugins: {
              legend: { labels: { color: '#fff' } }
          }
      }
  });

  const yardsCtx = document.getElementById('yardsChart').getContext('2d');
  const yardsChart = new Chart(yardsCtx, {
      type: 'bar',
      data: {
          labels: ['Week 1', 'Week 2', 'Week 3', 'Week 4', 'Week 5'],
          datasets: [{
              label: 'Yards',
              data: [450, 512, 490, 560, 480],
              backgroundColor: '#b5a642'
          }]
      },
      options: {
          scales: {
              y: { beginAtZero: true }
          },
          plugins: {
              legend: { labels: { color: '#fff' } }
          }
      }
  });
</script>

</body>
</html>
